name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: owner
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 app/frontend/app.py app/worker/worker.py --max-line-length=120

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [frontend, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.service }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/skywatch-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/skywatch-${{ matrix.service }}:latest

  update-helm-tags:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Update Helm values tags
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: |
            yq -i '.frontend.image.tag = "${{ steps.vars.outputs.short_sha }}"' helm/skywatch/values.yaml
            yq -i '.worker.image.tag = "${{ steps.vars.outputs.short_sha }}"' helm/skywatch/values.yaml

      - name: Commit and push Helm tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/skywatch/values.yaml
          git diff --staged --quiet || git commit -m "ci: bump image tags to ${{ steps.vars.outputs.short_sha }} [skip ci]"
          git push
