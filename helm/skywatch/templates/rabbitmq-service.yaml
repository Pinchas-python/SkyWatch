apiVersion: v1
kind: Service
metadata:
  name: {{ include "skywatch.fullname" . }}-rabbitmq
  labels:
    {{- include "skywatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
spec:
  type: ClusterIP
  selector:
    {{- include "skywatch.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
